name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build-and-release:
    name: Build and Release for ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_ext: .zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_ext: .tar.gz
          - os: macos-latest
            rid: osx-x64
            archive_ext: .tar.gz
          - os: macos-14 # Mac with Apple Silicon
            rid: osx-arm64
            archive_ext: .tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true --self-contained true -o ./publish

      - name: Create Zip Archive (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ./publish/* -DestinationPath CueComplete-${{ matrix.rid }}${{ matrix.archive_ext }}
        shell: pwsh

      - name: Create Tar Archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: tar -czvf CueComplete-${{ matrix.rid }}${{ matrix.archive_ext }} -C ./publish .
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: CueComplete-${{ matrix.rid }}${{ matrix.archive_ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
